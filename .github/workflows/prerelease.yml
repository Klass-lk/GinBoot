name: Pre-Release

on:
  workflow_dispatch:
  push:
    branches:
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race ./...

  release:
    name: Create Pre-Release
    needs: test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: prerelease
          pre_release_branches: develop
          append_to_pre_release_tag: rc
          tag_prefix: v

      - name: Tag and push submodules
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          NEW_TAG="${{ steps.tag_version.outputs.new_tag }}"
          git tag "db/mongo/$NEW_TAG"
          git tag "db/sql/$NEW_TAG"
          git tag "db/dynamodb/$NEW_TAG"
          git tag "storage/s3/$NEW_TAG"
          git tag "runtime/lambda/$NEW_TAG"
          git tag "telemetry/$NEW_TAG"
          git push origin "db/mongo/$NEW_TAG" "db/sql/$NEW_TAG" "db/dynamodb/$NEW_TAG" "storage/s3/$NEW_TAG" "runtime/lambda/$NEW_TAG" "telemetry/$NEW_TAG"

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v1
        if: steps.tag_version.outputs.new_tag != ''
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Pre-Release ${{ steps.tag_version.outputs.new_tag }}
          body: |
            ## Development Build (Release Candidate)
            ${{ steps.tag_version.outputs.changelog }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
